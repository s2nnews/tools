<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Streak Screener</title>
    <style>
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .chart-item {
            text-align: center;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .chart-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .chart-item img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }
        .chart-item h3 {
            margin: 10px 0;
            font-size: 16px;
            color: #333;
        }
        h2 {
            text-align: center;
            margin: 20px 0;
            color: #333;
        }
        .section-header {
            text-align: center;
            padding: 10px;
            margin: 20px 0 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        .up-header {
            background-color: #4CAF50;
        }
        .down-header {
            background-color: #f44336;
        }
        @media (max-width: 1200px) {
            .chart-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="section-header up-header">Up Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/$SMI_up_streak.png" class="lightbox" title="$SMI Up Streak">
            <img src="./assets/images/screeners/$SMI_up_streak.png" alt="$SMI Up Streak">
        </a>
        <h3>$SMI (9 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/$E3X_up_streak.png" class="lightbox" title="$E3X Up Streak">
            <img src="./assets/images/screeners/$E3X_up_streak.png" alt="$E3X Up Streak">
        </a>
        <h3>$E3X (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/GBPDKK_up_streak.png" class="lightbox" title="GBPDKK Up Streak">
            <img src="./assets/images/screeners/GBPDKK_up_streak.png" alt="GBPDKK Up Streak">
        </a>
        <h3>GBPDKK (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/GBPEUR_up_streak.png" class="lightbox" title="GBPEUR Up Streak">
            <img src="./assets/images/screeners/GBPEUR_up_streak.png" alt="GBPEUR Up Streak">
        </a>
        <h3>GBPEUR (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/USDHKD_up_streak.png" class="lightbox" title="USDHKD Up Streak">
            <img src="./assets/images/screeners/USDHKD_up_streak.png" alt="USDHKD Up Streak">
        </a>
        <h3>USDHKD (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/ZARAUD_up_streak.png" class="lightbox" title="ZARAUD Up Streak">
            <img src="./assets/images/screeners/ZARAUD_up_streak.png" alt="ZARAUD Up Streak">
        </a>
        <h3>ZARAUD (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/$FT100_up_streak.png" class="lightbox" title="$FT100 Up Streak">
            <img src="./assets/images/screeners/$FT100_up_streak.png" alt="$FT100 Up Streak">
        </a>
        <h3>$FT100 (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/$OMNX40_up_streak.png" class="lightbox" title="$OMNX40 Up Streak">
            <img src="./assets/images/screeners/$OMNX40_up_streak.png" alt="$OMNX40 Up Streak">
        </a>
        <h3>$OMNX40 (5 days)</h3>
    </div>

</div>

<div class="section-header down-header">Down Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/AUDZAR_down_streak.png" class="lightbox" title="AUDZAR Down Streak">
            <img src="./assets/images/screeners/AUDZAR_down_streak.png" alt="AUDZAR Down Streak">
        </a>
        <h3>AUDZAR (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/DKKGBP_down_streak.png" class="lightbox" title="DKKGBP Down Streak">

        </a>
        <h3>DKKGBP (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/EURGBP_down_streak.png" class="lightbox" title="EURGBP Down Streak">
            <img src="./assets/images/screeners/EURGBP_down_streak.png" alt="EURGBP Down Streak">
        </a>
        <h3>EURGBP (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/EURMYR_down_streak.png" class="lightbox" title="EURMYR Down Streak">
            <img src="./assets/images/screeners/EURMYR_down_streak.png" alt="EURMYR Down Streak">
        </a>
        <h3>EURMYR (5 days)</h3>
    </div>

</div>

</body>
</html>
