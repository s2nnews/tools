<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Streak Screener</title>
    <style>
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .chart-item {
            text-align: center;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .chart-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .chart-item img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }
        .chart-item h3 {
            margin: 10px 0;
            font-size: 16px;
            color: #333;
        }
        h2 {
            text-align: center;
            margin: 20px 0;
            color: #333;
        }
        .section-header {
            text-align: center;
            padding: 10px;
            margin: 20px 0 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        .up-header {
            background-color: #4CAF50;
        }
        .down-header {
            background-color: #f44336;
        }
        @media (max-width: 1200px) {
            .chart-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="section-header up-header">Up Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/NZDUSD_up_streak.png" class="lightbox" title="NZDUSD Up Streak">
            <img src="./assets/images/screeners/NZDUSD_up_streak.png" alt="NZDUSD Up Streak">
        </a>
        <h3>NZDUSD (10 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/AUDHKD_up_streak.png" class="lightbox" title="AUDHKD Up Streak">
            <img src="./assets/images/screeners/AUDHKD_up_streak.png" alt="AUDHKD Up Streak">
        </a>
        <h3>AUDHKD (9 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/AUDSGD_up_streak.png" class="lightbox" title="AUDSGD Up Streak">
            <img src="./assets/images/screeners/AUDSGD_up_streak.png" alt="AUDSGD Up Streak">
        </a>
        <h3>AUDSGD (9 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/AUDUSD_up_streak.png" class="lightbox" title="AUDUSD Up Streak">
            <img src="./assets/images/screeners/AUDUSD_up_streak.png" alt="AUDUSD Up Streak">
        </a>
        <h3>AUDUSD (9 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/&GC_CCB_up_streak.png" class="lightbox" title="&GC_CCB Up Streak">
            <img src="./assets/images/screeners/&GC_CCB_up_streak.png" alt="&GC_CCB Up Streak">
        </a>
        <h3>&GC_CCB (8 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/$HS_up_streak.png" class="lightbox" title="$HS Up Streak">
            <img src="./assets/images/screeners/$HS_up_streak.png" alt="$HS Up Streak">
        </a>
        <h3>$HS (7 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/ZARUSD_up_streak.png" class="lightbox" title="ZARUSD Up Streak">
            <img src="./assets/images/screeners/ZARUSD_up_streak.png" alt="ZARUSD Up Streak">
        </a>
        <h3>ZARUSD (7 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/$XIN0_up_streak.png" class="lightbox" title="$XIN0 Up Streak">
            <img src="./assets/images/screeners/$XIN0_up_streak.png" alt="$XIN0 Up Streak">
        </a>
        <h3>$XIN0 (5 days)</h3>
    </div>

</div>

<div class="section-header down-header">Down Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/USDNZD_down_streak.png" class="lightbox" title="USDNZD Down Streak">

    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/SGDAUD_down_streak.png" class="lightbox" title="SGDAUD Down Streak">
            <img src="./assets/images/screeners/SGDAUD_down_streak.png" alt="SGDAUD Down Streak">
        </a>
        <h3>SGDAUD (9 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/USDAUD_down_streak.png" class="lightbox" title="USDAUD Down Streak">
            <img src="./assets/images/screeners/USDAUD_down_streak.png" alt="USDAUD Down Streak">
        </a>
        <h3>USDAUD (9 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/USDZAR_down_streak.png" class="lightbox" title="USDZAR Down Streak">

</div>

</body>
</html>
