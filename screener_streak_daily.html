<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Streak Screener</title>
    <style>
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .chart-item {
            text-align: center;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .chart-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .chart-item img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }
        .chart-item h3 {
            margin: 10px 0;
            font-size: 16px;
            color: #333;
        }
        h2 {
            text-align: center;
            margin: 20px 0;
            color: #333;
        }
        .section-header {
            text-align: center;
            padding: 10px;
            margin: 20px 0 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        .up-header {
            background-color: #4CAF50;
        }
        .down-header {
            background-color: #f44336;
        }
        @media (max-width: 1200px) {
            .chart-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="section-header up-header">Up Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/EURAUD_up_streak.png" class="lightbox" title="EURAUD Up Streak">
            <img src="./assets/images/screeners/EURAUD_up_streak.png" alt="EURAUD Up Streak">
        </a>
        <h3>EURAUD (8 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/EURNZD_up_streak.png" class="lightbox" title="EURNZD Up Streak">
            <img src="./assets/images/screeners/EURNZD_up_streak.png" alt="EURNZD Up Streak">
        </a>
        <h3>EURNZD (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/HKDAUD_up_streak.png" class="lightbox" title="HKDAUD Up Streak">
            <img src="./assets/images/screeners/HKDAUD_up_streak.png" alt="HKDAUD Up Streak">
        </a>
        <h3>HKDAUD (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/USDAUD_up_streak.png" class="lightbox" title="USDAUD Up Streak">
            <img src="./assets/images/screeners/USDAUD_up_streak.png" alt="USDAUD Up Streak">
        </a>
        <h3>USDAUD (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/USDCAD_up_streak.png" class="lightbox" title="USDCAD Up Streak">
            <img src="./assets/images/screeners/USDCAD_up_streak.png" alt="USDCAD Up Streak">
        </a>
        <h3>USDCAD (5 days)</h3>
    </div>

</div>

<div class="section-header down-header">Down Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/AUDEUR_down_streak.png" class="lightbox" title="AUDEUR Down Streak">
            <img src="./assets/images/screeners/AUDEUR_down_streak.png" alt="AUDEUR Down Streak">
        </a>
        <h3>AUDEUR (8 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/AUDHKD_down_streak.png" class="lightbox" title="AUDHKD Down Streak">
            <img src="./assets/images/screeners/AUDHKD_down_streak.png" alt="AUDHKD Down Streak">
        </a>
        <h3>AUDHKD (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/AUDUSD_down_streak.png" class="lightbox" title="AUDUSD Down Streak">
            <img src="./assets/images/screeners/AUDUSD_down_streak.png" alt="AUDUSD Down Streak">
        </a>
        <h3>AUDUSD (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/NZDEUR_down_streak.png" class="lightbox" title="NZDEUR Down Streak">
            <img src="./assets/images/screeners/NZDEUR_down_streak.png" alt="NZDEUR Down Streak">
        </a>
        <h3>NZDEUR (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/CADUSD_down_streak.png" class="lightbox" title="CADUSD Down Streak">
            <img src="./assets/images/screeners/CADUSD_down_streak.png" alt="CADUSD Down Streak">
        </a>
        <h3>CADUSD (5 days)</h3>
    </div>

</div>

</body>
</html>
