<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Streak Screener</title>
    <style>
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .chart-item {
            text-align: center;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .chart-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .chart-item img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }
        .chart-item h3 {
            margin: 10px 0;
            font-size: 16px;
            color: #333;
        }
        h2 {
            text-align: center;
            margin: 20px 0;
            color: #333;
        }
        .section-header {
            text-align: center;
            padding: 10px;
            margin: 20px 0 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        .up-header {
            background-color: #4CAF50;
        }
        .down-header {
            background-color: #f44336;
        }
        @media (max-width: 1200px) {
            .chart-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="section-header up-header">Up Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/USDINR_up_streak.png" class="lightbox" title="USDINR Up Streak">
            <img src="./assets/images/screeners/USDINR_up_streak.png" alt="USDINR Up Streak">
        </a>
        <h3>USDINR (8 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/CADJPY_up_streak.png" class="lightbox" title="CADJPY Up Streak">
            <img src="./assets/images/screeners/CADJPY_up_streak.png" alt="CADJPY Up Streak">
        </a>
        <h3>CADJPY (7 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/USDJPY_up_streak.png" class="lightbox" title="USDJPY Up Streak">
            <img src="./assets/images/screeners/USDJPY_up_streak.png" alt="USDJPY Up Streak">
        </a>
        <h3>USDJPY (7 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/$SMI_up_streak.png" class="lightbox" title="$SMI Up Streak">
            <img src="./assets/images/screeners/$SMI_up_streak.png" alt="$SMI Up Streak">
        </a>
        <h3>$SMI (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/USDTRY_up_streak.png" class="lightbox" title="USDTRY Up Streak">
            <img src="./assets/images/screeners/USDTRY_up_streak.png" alt="USDTRY Up Streak">
        </a>
        <h3>USDTRY (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/RUBUSD_up_streak.png" class="lightbox" title="RUBUSD Up Streak">
            <img src="./assets/images/screeners/RUBUSD_up_streak.png" alt="RUBUSD Up Streak">
        </a>
        <h3>RUBUSD (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/&NG_CCB_up_streak.png" class="lightbox" title="&NG_CCB Up Streak">
            <img src="./assets/images/screeners/&NG_CCB_up_streak.png" alt="&NG_CCB Up Streak">
        </a>
        <h3>&NG_CCB (5 days)</h3>
    </div>

</div>

<div class="section-header down-header">Down Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/INRUSD_down_streak.png" class="lightbox" title="INRUSD Down Streak">
            <img src="./assets/images/screeners/INRUSD_down_streak.png" alt="INRUSD Down Streak">
        </a>
        <h3>INRUSD (8 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/JPYCAD_down_streak.png" class="lightbox" title="JPYCAD Down Streak">
            <img src="./assets/images/screeners/JPYCAD_down_streak.png" alt="JPYCAD Down Streak">
        </a>
        <h3>JPYCAD (7 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/JPYUSD_down_streak.png" class="lightbox" title="JPYUSD Down Streak">
            <img src="./assets/images/screeners/JPYUSD_down_streak.png" alt="JPYUSD Down Streak">
        </a>
        <h3>JPYUSD (7 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/USDRUB_down_streak.png" class="lightbox" title="USDRUB Down Streak">
            <img src="./assets/images/screeners/USDRUB_down_streak.png" alt="USDRUB Down Streak">
        </a>
        <h3>USDRUB (5 days)</h3>
    </div>

</div>

</body>
</html>
