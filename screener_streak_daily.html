<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Streak Screener</title>
    <style>
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .chart-item {
            text-align: center;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .chart-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .chart-item img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }
        .chart-item h3 {
            margin: 10px 0;
            font-size: 16px;
            color: #333;
        }
        h2 {
            text-align: center;
            margin: 20px 0;
            color: #333;
        }
        .section-header {
            text-align: center;
            padding: 10px;
            margin: 20px 0 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        .up-header {
            background-color: #4CAF50;
        }
        .down-header {
            background-color: #f44336;
        }
        @media (max-width: 1200px) {
            .chart-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="section-header up-header">Up Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/CADJPY_up_streak.png" class="lightbox" title="CADJPY Up Streak">
            <img src="./assets/images/screeners/CADJPY_up_streak.png" alt="CADJPY Up Streak">
        </a>
        <h3>CADJPY (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/INREUR_up_streak.png" class="lightbox" title="INREUR Up Streak">
            <img src="./assets/images/screeners/INREUR_up_streak.png" alt="INREUR Up Streak">
        </a>
        <h3>INREUR (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/NZDJPY_up_streak.png" class="lightbox" title="NZDJPY Up Streak">
            <img src="./assets/images/screeners/NZDJPY_up_streak.png" alt="NZDJPY Up Streak">
        </a>
        <h3>NZDJPY (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/INRUSD_up_streak.png" class="lightbox" title="INRUSD Up Streak">
            <img src="./assets/images/screeners/INRUSD_up_streak.png" alt="INRUSD Up Streak">
        </a>
        <h3>INRUSD (5 days)</h3>
    </div>

</div>

<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/$SPCBDM_down_streak.png" class="lightbox" title="$SPCBDM Down Streak">
            <img src="./assets/images/screeners/$SPCBDM_down_streak.png" alt="$SPCBDM Down Streak">
        </a>
        <h3>$SPCBDM (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/$SPCMC_down_streak.png" class="lightbox" title="$SPCMC Down Streak">
            <img src="./assets/images/screeners/$SPCMC_down_streak.png" alt="$SPCMC Down Streak">
        </a>
        <h3>$SPCMC (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/EURINR_down_streak.png" class="lightbox" title="EURINR Down Streak">
            <img src="./assets/images/screeners/EURINR_down_streak.png" alt="EURINR Down Streak">
        </a>
        <h3>EURINR (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/JPYCAD_down_streak.png" class="lightbox" title="JPYCAD Down Streak">

        </a>

        </a>

        </a>

        <a href="./assets/images/screeners/NVDA_down_streak.png" class="lightbox" title="NVDA Down Streak">

</body>
</html>
