<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Streak Screener</title>
    <style>
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .chart-item {
            text-align: center;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .chart-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .chart-item img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }
        .chart-item h3 {
            margin: 10px 0;
            font-size: 16px;
            color: #333;
        }
        h2 {
            text-align: center;
            margin: 20px 0;
            color: #333;
        }
        .section-header {
            text-align: center;
            padding: 10px;
            margin: 20px 0 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        .up-header {
            background-color: #4CAF50;
        }
        .down-header {
            background-color: #f44336;
        }
        @media (max-width: 1200px) {
            .chart-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="section-header up-header">Up Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/USDTRY_up_streak.png" class="lightbox" title="USDTRY Up Streak">
            <img src="./assets/images/screeners/USDTRY_up_streak.png" alt="USDTRY Up Streak">
        </a>
        <h3>USDTRY (15 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/HKDGBP_up_streak.png" class="lightbox" title="HKDGBP Up Streak">
            <img src="./assets/images/screeners/HKDGBP_up_streak.png" alt="HKDGBP Up Streak">
        </a>
        <h3>HKDGBP (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/JPYGBP_up_streak.png" class="lightbox" title="JPYGBP Up Streak">
            <img src="./assets/images/screeners/JPYGBP_up_streak.png" alt="JPYGBP Up Streak">
        </a>
        <h3>JPYGBP (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/NOKCHF_up_streak.png" class="lightbox" title="NOKCHF Up Streak">
            <img src="./assets/images/screeners/NOKCHF_up_streak.png" alt="NOKCHF Up Streak">
        </a>
        <h3>NOKCHF (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/SGDGBP_up_streak.png" class="lightbox" title="SGDGBP Up Streak">
            <img src="./assets/images/screeners/SGDGBP_up_streak.png" alt="SGDGBP Up Streak">
        </a>
        <h3>SGDGBP (5 days)</h3>
    </div>

</div>

<div class="section-header down-header">Down Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/CHFNOK_down_streak.png" class="lightbox" title="CHFNOK Down Streak">
            <img src="./assets/images/screeners/CHFNOK_down_streak.png" alt="CHFNOK Down Streak">
        </a>
        <h3>CHFNOK (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/GBPHKD_down_streak.png" class="lightbox" title="GBPHKD Down Streak">
            <img src="./assets/images/screeners/GBPHKD_down_streak.png" alt="GBPHKD Down Streak">
        </a>
        <h3>GBPHKD (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/GBPJPY_down_streak.png" class="lightbox" title="GBPJPY Down Streak">
            <img src="./assets/images/screeners/GBPJPY_down_streak.png" alt="GBPJPY Down Streak">
        </a>
        <h3>GBPJPY (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/GBPSGD_down_streak.png" class="lightbox" title="GBPSGD Down Streak">
            <img src="./assets/images/screeners/GBPSGD_down_streak.png" alt="GBPSGD Down Streak">
        </a>
        <h3>GBPSGD (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/META_down_streak.png" class="lightbox" title="META Down Streak">
            <img src="./assets/images/screeners/META_down_streak.png" alt="META Down Streak">
        </a>
        <h3>META (5 days)</h3>
    </div>

</div>

</body>
</html>
