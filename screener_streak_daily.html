<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Streak Screener</title>
    <style>
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .chart-item {
            text-align: center;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .chart-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .chart-item img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }
        .chart-item h3 {
            margin: 10px 0;
            font-size: 16px;
            color: #333;
        }
        h2 {
            text-align: center;
            margin: 20px 0;
            color: #333;
        }
        .section-header {
            text-align: center;
            padding: 10px;
            margin: 20px 0 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        .up-header {
            background-color: #4CAF50;
        }
        .down-header {
            background-color: #f44336;
        }
        @media (max-width: 1200px) {
            .chart-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="section-header up-header">Up Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/USDTRY_up_streak.png" class="lightbox" title="USDTRY Up Streak">
            <img src="./assets/images/screeners/USDTRY_up_streak.png" alt="USDTRY Up Streak">
        </a>
        <h3>USDTRY (12 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/NZDEUR_up_streak.png" class="lightbox" title="NZDEUR Up Streak">
            <img src="./assets/images/screeners/NZDEUR_up_streak.png" alt="NZDEUR Up Streak">
        </a>
        <h3>NZDEUR (8 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/AUDZAR_up_streak.png" class="lightbox" title="AUDZAR Up Streak">
            <img src="./assets/images/screeners/AUDZAR_up_streak.png" alt="AUDZAR Up Streak">
        </a>
        <h3>AUDZAR (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/CADJPY_up_streak.png" class="lightbox" title="CADJPY Up Streak">
            <img src="./assets/images/screeners/CADJPY_up_streak.png" alt="CADJPY Up Streak">
        </a>
        <h3>CADJPY (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/EURTWD_up_streak.png" class="lightbox" title="EURTWD Up Streak">
            <img src="./assets/images/screeners/EURTWD_up_streak.png" alt="EURTWD Up Streak">
        </a>
        <h3>EURTWD (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/NZDAUD_up_streak.png" class="lightbox" title="NZDAUD Up Streak">
            <img src="./assets/images/screeners/NZDAUD_up_streak.png" alt="NZDAUD Up Streak">
        </a>
        <h3>NZDAUD (5 days)</h3>
    </div>

</div>

<div class="section-header down-header">Down Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/EURNZD_down_streak.png" class="lightbox" title="EURNZD Down Streak">
            <img src="./assets/images/screeners/EURNZD_down_streak.png" alt="EURNZD Down Streak">
        </a>
        <h3>EURNZD (8 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/$OMNX40_down_streak.png" class="lightbox" title="$OMNX40 Down Streak">
            <img src="./assets/images/screeners/$OMNX40_down_streak.png" alt="$OMNX40 Down Streak">
        </a>
        <h3>$OMNX40 (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/ZARAUD_down_streak.png" class="lightbox" title="ZARAUD Down Streak">
            <img src="./assets/images/screeners/ZARAUD_down_streak.png" alt="ZARAUD Down Streak">
        </a>
        <h3>ZARAUD (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/AUDNZD_down_streak.png" class="lightbox" title="AUDNZD Down Streak">
            <img src="./assets/images/screeners/AUDNZD_down_streak.png" alt="AUDNZD Down Streak">
        </a>
        <h3>AUDNZD (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/JPYCAD_down_streak.png" class="lightbox" title="JPYCAD Down Streak">
            <img src="./assets/images/screeners/JPYCAD_down_streak.png" alt="JPYCAD Down Streak">
        </a>
        <h3>JPYCAD (5 days)</h3>
    </div>

</div>

</body>
</html>
