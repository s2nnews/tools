<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Streak Screener</title>
    <style>
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .chart-item {
            text-align: center;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .chart-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .chart-item img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }
        .chart-item h3 {
            margin: 10px 0;
            font-size: 16px;
            color: #333;
        }
        h2 {
            text-align: center;
            margin: 20px 0;
            color: #333;
        }
        .section-header {
            text-align: center;
            padding: 10px;
            margin: 20px 0 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        .up-header {
            background-color: #4CAF50;
        }
        .down-header {
            background-color: #f44336;
        }
        @media (max-width: 1200px) {
            .chart-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="section-header up-header">Up Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/$RTS_up_streak.png" class="lightbox" title="$RTS Up Streak">
            <img src="./assets/images/screeners/$RTS_up_streak.png" alt="$RTS Up Streak">
        </a>
        <h3>$RTS (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/HKDEUR_up_streak.png" class="lightbox" title="HKDEUR Up Streak">
            <img src="./assets/images/screeners/HKDEUR_up_streak.png" alt="HKDEUR Up Streak">
        </a>
        <h3>HKDEUR (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/USDCZK_up_streak.png" class="lightbox" title="USDCZK Up Streak">
            <img src="./assets/images/screeners/USDCZK_up_streak.png" alt="USDCZK Up Streak">
        </a>
        <h3>USDCZK (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/USDTRY_up_streak.png" class="lightbox" title="USDTRY Up Streak">
            <img src="./assets/images/screeners/USDTRY_up_streak.png" alt="USDTRY Up Streak">
        </a>
        <h3>USDTRY (5 days)</h3>
    </div>

</div>

<div class="section-header down-header">Down Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/AMZN_down_streak.png" class="lightbox" title="AMZN Down Streak">
            <img src="./assets/images/screeners/AMZN_down_streak.png" alt="AMZN Down Streak">
        </a>
        <h3>AMZN (9 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/&CC_CCB_down_streak.png" class="lightbox" title="&CC_CCB Down Streak">
            <img src="./assets/images/screeners/&CC_CCB_down_streak.png" alt="&CC_CCB Down Streak">
        </a>
        <h3>&CC_CCB (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/$FTSEMIB_down_streak.png" class="lightbox" title="$FTSEMIB Down Streak">
            <img src="./assets/images/screeners/$FTSEMIB_down_streak.png" alt="$FTSEMIB Down Streak">
        </a>
        <h3>$FTSEMIB (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/$STOXX50_down_streak.png" class="lightbox" title="$STOXX50 Down Streak">
            <img src="./assets/images/screeners/$STOXX50_down_streak.png" alt="$STOXX50 Down Streak">
        </a>
        <h3>$STOXX50 (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/CZKUSD_down_streak.png" class="lightbox" title="CZKUSD Down Streak">
            <img src="./assets/images/screeners/CZKUSD_down_streak.png" alt="CZKUSD Down Streak">
        </a>
        <h3>CZKUSD (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/EURHKD_down_streak.png" class="lightbox" title="EURHKD Down Streak">
            <img src="./assets/images/screeners/EURHKD_down_streak.png" alt="EURHKD Down Streak">
        </a>
        <h3>EURHKD (5 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/EURUSD_down_streak.png" class="lightbox" title="EURUSD Down Streak">
            <img src="./assets/images/screeners/EURUSD_down_streak.png" alt="EURUSD Down Streak">
        </a>
        <h3>EURUSD (5 days)</h3>
    </div>

</div>

</body>
</html>
