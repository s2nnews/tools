<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Streak Screener</title>
    <style>
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .chart-item {
            text-align: center;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .chart-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .chart-item img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }
        .chart-item h3 {
            margin: 10px 0;
            font-size: 16px;
            color: #333;
        }
        h2 {
            text-align: center;
            margin: 20px 0;
            color: #333;
        }
        .section-header {
            text-align: center;
            padding: 10px;
            margin: 20px 0 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        .up-header {
            background-color: #4CAF50;
        }
        .down-header {
            background-color: #f44336;
        }
        @media (max-width: 1200px) {
            .chart-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="section-header up-header">Up Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/$W1DOW_up_streak.png" class="lightbox" title="$W1DOW Up Streak">
            <img src="./assets/images/screeners/$W1DOW_up_streak.png" alt="$W1DOW Up Streak">
        </a>
        <h3>$W1DOW (7 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/ILSUSD_up_streak.png" class="lightbox" title="ILSUSD Up Streak">
            <img src="./assets/images/screeners/ILSUSD_up_streak.png" alt="ILSUSD Up Streak">
        </a>
        <h3>ILSUSD (7 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/$SPX_up_streak.png" class="lightbox" title="$SPX Up Streak">
            <img src="./assets/images/screeners/$SPX_up_streak.png" alt="$SPX Up Streak">
        </a>
        <h3>$SPX (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/&ES_CCB_up_streak.png" class="lightbox" title="&ES_CCB Up Streak">
            <img src="./assets/images/screeners/&ES_CCB_up_streak.png" alt="&ES_CCB Up Streak">
        </a>
        <h3>&ES_CCB (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/TSLA_up_streak.png" class="lightbox" title="TSLA Up Streak">
            <img src="./assets/images/screeners/TSLA_up_streak.png" alt="TSLA Up Streak">
        </a>
        <h3>TSLA (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/META_up_streak.png" class="lightbox" title="META Up Streak">
            <img src="./assets/images/screeners/META_up_streak.png" alt="META Up Streak">
        </a>
        <h3>META (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/EURJPY_up_streak.png" class="lightbox" title="EURJPY Up Streak">
            <img src="./assets/images/screeners/EURJPY_up_streak.png" alt="EURJPY Up Streak">
        </a>
        <h3>EURJPY (5 days)</h3>
    </div>

</div>

<div class="section-header down-header">Down Streaks (5+ days)</div>
<div class='chart-grid'>

    <div class="chart-item">
        <a href="./assets/images/screeners/EURHUF_down_streak.png" class="lightbox" title="EURHUF Down Streak">
            <img src="./assets/images/screeners/EURHUF_down_streak.png" alt="EURHUF Down Streak">
        </a>
        <h3>EURHUF (7 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/USDILS_down_streak.png" class="lightbox" title="USDILS Down Streak">
            <img src="./assets/images/screeners/USDILS_down_streak.png" alt="USDILS Down Streak">
        </a>
        <h3>USDILS (7 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/&KE_CCB_down_streak.png" class="lightbox" title="&KE_CCB Down Streak">
            <img src="./assets/images/screeners/&KE_CCB_down_streak.png" alt="&KE_CCB Down Streak">
        </a>
        <h3>&KE_CCB (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/%TYX_down_streak.png" class="lightbox" title="%TYX Down Streak">
            <img src="./assets/images/screeners/%TYX_down_streak.png" alt="%TYX Down Streak">
        </a>
        <h3>%TYX (6 days)</h3>
    </div>

    <div class="chart-item">
        <a href="./assets/images/screeners/JPYEUR_down_streak.png" class="lightbox" title="JPYEUR Down Streak">
            <img src="./assets/images/screeners/JPYEUR_down_streak.png" alt="JPYEUR Down Streak">
        </a>
        <h3>JPYEUR (5 days)</h3>
    </div>

</div>

</body>
</html>
